# Template entities for onlyfansd ceiling fans.
# Mirrors the REST-created fan.<room>_fan / light.<room>_fan_light entities
# and exposes them with persistent unique_ids so they're fully UI-manageable.
#
# Usage in configuration.yaml:
#   template: !include ceiling_fans.yaml

- fan:
    - name: "Living Room Ceiling Fan"
      unique_id: onlyfansd_living_room_fan
      state: "{{ is_state('fan.living_room_fan', 'on') }}"
      percentage: "{{ state_attr('fan.living_room_fan', 'percentage') | int(0) }}"
      direction: "{{ state_attr('fan.living_room_fan', 'direction') or 'forward' }}"
      speed_count: 6
      turn_on:
        - action: fan.turn_on
          target: { entity_id: fan.living_room_fan }
          data:
            percentage: "{{ percentage | default(35) }}"
      turn_off:
        - action: fan.turn_off
          target: { entity_id: fan.living_room_fan }
      set_percentage:
        - action: fan.set_percentage
          target: { entity_id: fan.living_room_fan }
          data: { percentage: "{{ percentage }}" }
      set_direction:
        - action: fan.set_direction
          target: { entity_id: fan.living_room_fan }
          data: { direction: "{{ direction }}" }

    - name: "Parents Room Ceiling Fan"
      unique_id: onlyfansd_parents_room_fan
      state: "{{ is_state('fan.parents_room_fan', 'on') }}"
      percentage: "{{ state_attr('fan.parents_room_fan', 'percentage') | int(0) }}"
