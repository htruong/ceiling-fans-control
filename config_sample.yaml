# Home Assistant — required. Used for the HA-mediated RF transport (when
# rf.transport ∈ {ha_rest, http}) and, when listen: true, to subscribe to
# `call_service` events and mirror entity state back to HA via REST.
# When rf.transport: spi, only `listen` and the REST mirror are used —
# the URL/token can still be omitted for a fully local deployment by
# setting listen: false.
homeassistant:
  url: http://homeassistant.local:8123
  token: your_long_lived_access_token
  # If true (default), subscribe to HA's WebSocket for service calls and
  # mirror entity state back to HA via REST. Set to false for a
  # HomeKit-only / SPI-direct deployment that doesn't talk to HA at all.
  listen: true

# RF transport — required.
rf:
  # ha_rest — POST to HA's REST API; HA proxies to ESPHome over its native link.
  # http    — POST directly to the ESPHome web_server; bypasses HA entirely.
  # spi     — drive a locally-attached CC1101 over SPI (Pi-native). Linux-only.
  transport: ha_rest
  repeat: 4   # retransmits per command (physical remote does 3-5)

# Required when transport ∈ {ha_rest, http}. Omit for transport: spi.
esphome:
  device: fan_remote1   # ESPHome `name:` (underscored form). Used as the
                        # HA service suffix on the ha_rest transport.

  # Required only when transport: http.
  # http:
  #   host: fan-remote1.local      # or an IP
  #   port: 80                     # default 80
  #   username: !secret web_user   # match web_server.auth in fan-remote.yaml
  #   password: !secret web_pass   # omit both if web_server.auth is unset

# Required when transport: spi. Drives a CC1101 wired directly to the host
# (e.g. a Pi Zero W) over SPI in packet/FIFO mode. See README.md for wiring.
# cc1101:
#   device: /dev/spidev0.0   # default; SPI0 / CE0 on a Pi with the default overlay
#   frequency_hz: 304300000  # default 304.30 MHz (Casa Vieja TR301A)
#   power: 0xC0              # default; PATABLE[1] "carrier on" byte (~+11 dBm)

# 14-bit FAN_IDs (as strings of '0'/'1'). Sniff them off the remote with
# decode_fan_remote.py, or pair arbitrary IDs using the fan's SET button —
# see the README for the SET-button procedure.
fans:
  living_room:  '00000000000000'
  parents_room: '00000000000001'
  baby_room:    '00000000000010'

# Optional: expose fans directly to HomeKit.
# Persistent pairing state is kept in `persist_dir`.
# Bridge name defaults to the machine's hostname if omitted.
# `bind` defaults to 0.0.0.0 (listen on every interface); pin it to a
# specific NIC IP only if you've got a multi-homed host that needs to
# constrain which network can see the accessory.
# homekit:
#   enabled: true
#   bind: 0.0.0.0
#   port: 51826
#   pin: '03141592'
#   persist_dir: /var/lib/onlyfansd/homekit
#   name: Ceiling Fans
