# Casa Vieja ceiling-fan remote bridge (ESP32 + CC1101). TX-only.
#
# Deploy this firmware ONCE. All fan-specific config (fan IDs, commands)
# lives in Home Assistant or whatever calls the transmit endpoints.
#
# Hardware:
#   SPI: CLK=GPIO18, MOSI=GPIO23, MISO=GPIO19, CS=GPIO5
#   CC1101 GDO0 -> GPIO22 (TX data into CC1101)
#   (GDO2 is unused — this firmware never listens.)
#
# Protocol: 304.30 MHz OOK, 333us per chip, 25-bit messages.
# Each bit b -> chips "10b". See protocol.txt.

esphome:
  name: fan-remote1
  friendly_name: fan-remote1

esp32:
  board: esp32dev
  framework:
    advanced:
      sram1_as_iram: true   # +40KB IRAM the bootloader supports but ESPHome doesn't claim by default

logger:
  level: DEBUG

# Shared transmit script — invoked by both the HA-native action and the
# HTTP/text entity below. Keeps the OOK encoder in one place. The script
# is bit-length agnostic: it encodes whatever '0'/'1' string it gets, so
# fans with different protocols (longer/shorter frames) work with no
# firmware change.
script:
  - id: do_transmit
    parameters:
      bits: string   # any '0'/'1' string. For Casa Vieja TR301A this is
                     # "1111" + fan_id(14) + cmdid(7) = 25 chars, but the
                     # encoder doesn't care.
      repeat: int    # retransmits per call (real remote sends 3-5)
    then:
      - repeat:
          count: !lambda "return repeat;"
          then:
            - remote_transmitter.transmit_raw:
                code: !lambda |-
                  ESP_LOGI("fan-remote", "TX bits=%s", bits.c_str());
                  // Encode each bit b -> chips "10b", then append 30
                  // silent chips (~10ms) so each frame carries its own
                  // inter-burst pause. This lets us run the transmitter
                  // in non_blocking mode without needing a separate
                  // `delay:` action between repeats.
                  const int CHIP_US = 333;
                  std::string chips;
                  chips.reserve(bits.size() * 3 + 30);
                  for (char b : bits) {
                    chips += '1';
                    chips += '0';
                    chips += b;
                  }
                  chips.append(30, '0');
                  // RLE-compress runs of identical chips into +/- microsecond pulses.
                  std::vector<int32_t> pulses;
                  size_t i = 0;
                  while (i < chips.size()) {
                    char level = chips[i];
                    size_t run = 1;
                    while (i + run < chips.size() && chips[i + run] == level) run++;
                    int32_t dur = (int32_t)(run * CHIP_US);
                    pulses.push_back(level == '1' ? dur : -dur);
                    i += run;
                  }
                  return pulses;

# Transport #1: Home Assistant native API.
# Call as: action esphome.fan_remote1_transmit_fan_bits
api:
  encryption:
    key: !secret api_encryption_key
  actions:
    - action: transmit_fan_bits
      variables:
        bits: string
        repeat: int
      then:
        - script.execute:
            id: do_transmit
            bits: !lambda "return bits;"
            repeat: !lambda "return repeat;"

# Transport #2: plain HTTP via web_server.
# Call as: POST http://fan-remote1.local/text/rf_tx/set?value=<bits>[:<repeat>]
# E.g.:    POST .../set?value=1111010111111010000000010:4
# A trailing ":<n>" sets repeat; default is 4.
text:
  - platform: template
    # No space so the new web_server URL form (which uses the entity name,
    # not the object_id) doesn't need URL-encoding: /text/rf_tx/set.
    name: rf_tx
    id: rf_tx
    mode: text
    optimistic: true
    min_length: 1
    max_length: 255
    on_value:
      then:
        - if:
            condition:
              lambda: "return !x.empty();"
            then:
              - script.execute:
                  id: do_transmit
                  bits: !lambda |-
                    auto colon = x.find(':');
                    return colon == std::string::npos ? x : x.substr(0, colon);
                  repeat: !lambda |-
                    auto colon = x.find(':');
                    if (colon == std::string::npos) return 4;
                    return atoi(x.substr(colon + 1).c_str());

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Fan-Remote1 Fallback Hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  # Basic auth so anyone on the LAN can't toggle the fans via curl.
  # Daemon / scripts use these creds for HTTP Basic on /text/rf_tx/set.
  auth:
    username: !secret web_username
    password: !secret web_password

# ---------------------------------------------------------------------------
# CC1101 radio (built into ESPHome since esphome/esphome#11849).
# TX-only. GDO0 (TX data in) -> GPIO22. GDO2 left unconnected.
# ---------------------------------------------------------------------------

spi:
  - id: spi_bus0
    clk_pin: GPIO18
    mosi_pin: GPIO23
    miso_pin: GPIO19
    interface: hardware

cc1101:
  id: cc1101_radio
  cs_pin: GPIO5
  frequency: 304.30MHz
  modulation_type: ASK/OOK
  filter_bandwidth: 203kHz
  # Our chip duration is 333us → ~3000 baud. Mismatched symbol_rate
  # affects the modulator's oversampling / pulse shaping in async
  # serial OOK mode and was the leading suspect for flaky TX.
  symbol_rate: 3000
  output_power: 11   # dBm — max the chip supports (was 10)

# Generic raw OOK out of CC1101 GDO0. The chip is parked in idle and
# only flipped into TX mode for the duration of a frame.
remote_transmitter:
  id: tx
  pin: GPIO22
  carrier_duty_percent: 100%   # OOK: CC1101 supplies the carrier, we just gate it
  eot_level: false
  # Each frame already contains its trailing ~10ms silence (see the
  # encoder lambda), so back-to-back queued frames carry the correct
  # inter-burst pause without us having to block the action chain.
  non_blocking: true
  on_transmit:
    then:
      # set_idle → begin_tx forces a fresh PLL calibration before each
      # frame (idle→tx transition triggers SCAL). Skipping it costs no
      # latency you'll notice and sometimes the synth drifts enough that
      # the fan's narrow front-end rejects an otherwise-valid frame.
      - cc1101.set_idle
      - cc1101.begin_tx
  on_complete:
    then:
      - cc1101.set_idle

# ---------------------------------------------------------------------------
# TX examples — call either transport with:
#
#   bits = "1111" + 14-bit FAN_ID + 7-bit cmdid
#
# parents_room (FAN_ID 01011111101000):
#   light   -> bits: "1111010111111010000000010"
#   stop    -> bits: "1111010111111010000000100"
#   speed1  -> bits: "1111010111111010000010000"
#   speed2  -> bits: "1111010111111010000010100"
#   speed3  -> bits: "1111010111111010000100000"
#   speed4  -> bits: "1111010111111010000110000"
#   speed5  -> bits: "1111010111111010001000100"
#   speed6  -> bits: "1111010111111010001000000"
#   reverse -> bits: "1111010111111010000001000"
#
# HA action:
#   service: esphome.fan_remote1_transmit_fan_bits
#   data: { bits: "...", repeat: 4 }
#
# Plain HTTP:
#   POST http://fan-remote1.local/text/rf_tx/set?value=<bits>:<repeat>:<nonce>
# ---------------------------------------------------------------------------
