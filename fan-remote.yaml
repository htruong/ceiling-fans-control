# ---------------------------------------------------------------------------
# TX from HA — call the action like this:
#
#   service: esphome.fan_remote_transmit_fan_bits
#   data:
#     bits: "111101011111101000{cmdid}"   # "1111" + parents_room id + cmdid
#     repeat: 4
#
# Examples for parents_room (FAN_ID 01011111101000):
#   light   -> bits: "1111010111111010000000010"
#   stop    -> bits: "1111010111111010000000100"
#   speed1  -> bits: "1111010111111010000010000"
#   speed2  -> bits: "1111010111111010000010100"
#   speed3  -> bits: "1111010111111010000100000"
#   speed4  -> bits: "1111010111111010000110000"
#   speed5  -> bits: "1111010111111010001000100"
#   speed6  -> bits: "1111010111111010001000000"
#   reverse -> bits: "1111010111111010000001000"
#
# Put these in HA scripts/automations or build them with templates. Adding a
# new fan = adding a new HA script; no firmware reflash needed.
